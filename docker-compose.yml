services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optclaw-api
    ports:
      - "8000:8000"
    volumes:
      - ./.env:/app/.env:ro
      - ./config.yaml:/app/config.yaml:ro
      - ./skills:/app/skills:ro
      - optclaw-data:/app/optclaw/.opt-claw
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: optclaw-frontend
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  optclaw-data:
