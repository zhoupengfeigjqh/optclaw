# ============================================================================
# Tools Configuration
# ============================================================================
# Configure available tools for the agent to use

tools:
  # Web search tool (uses DuckDuckGo, no API key required)
  - name: web_search
    group: web
    use: optclaw.community.ddg_search.tools:web_search_tool
    max_results: 5

  # Web search tool (requires Tavily API key)
  - name: web_search
    group: web
    use: optclaw.community.tavily.tools:web_search_tool
    max_results: 5
    api_key: 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