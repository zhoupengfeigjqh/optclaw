<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OptClaw Agent</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="app">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <button class="btn-new-chat" id="btnNewChat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>新建对话</span>
      </button>
    </div>
    <div class="sidebar-search">
      <input type="text" id="searchThreads" placeholder="搜索对话..." />
    </div>
    <div class="thread-list" id="threadList"></div>
    <div class="sidebar-footer">
      <div class="sidebar-toggle-group">
        <label class="toggle-item">
          <span>思考模式</span>
          <input type="checkbox" id="toggleThinking" />
          <span class="toggle-switch"></span>
        </label>
        <label class="toggle-item">
          <span>子Agent</span>
          <input type="checkbox" id="toggleSubagent" />
          <span class="toggle-switch"></span>
        </label>
      </div>
    </div>
  </aside>

  <main class="chat-area">
    <div class="chat-header">
      <button class="btn-sidebar-toggle" id="btnSidebarToggle">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
      <div class="model-selector">
        <select id="modelSelect"></select>
      </div>
    </div>

    <div class="chat-messages" id="chatMessages">
      <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-icon">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <h2>OptClaw Agent</h2>
        <p>开始一段新的对话</p>
      </div>
    </div>

    <div class="chat-input-area">
      <div class="upload-area" id="uploadArea">
        <div class="upload-files" id="uploadFiles"></div>
        <button class="btn-upload" id="btnUpload" title="上传文件">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21.44 15.91l-1 4a2 2 0 01-2 2H5.56a2 2 0 01-2-2l-1-4"/><polyline points="17 7 12 2 7 7"/><line x1="12" y1="2" x2="12" y2="16"/></svg>
        </button>
        <input type="file" id="fileInput" multiple hidden />
      </div>
      <div class="input-row">
        <textarea id="messageInput" placeholder="输入消息..." rows="1"></textarea>
        <button class="btn-send" id="btnSend" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
    </div>
  </main>
</div>

<script src="/js/app.js"></script>
</body>
</html>
